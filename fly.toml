# Fly.io deployment config for Zuora SE Demo Data Agent
#
# Deploy:  fly deploy
# Logs:    fly logs
# SSH:     fly ssh console
# Secrets: fly secrets set KEY=VALUE

app = "zuora-se-demo-data-agent"
primary_region = "sjc"  # San Jose — closest to Zuora's US infra

[build]
  dockerfile = "Dockerfile"

[env]
  # Non-secret config. Secrets (ANTHROPIC_API_KEY, MASTER_ENCRYPTION_KEY,
  # SESSION_SECRET) go in `fly secrets set` — they're injected as env vars
  # at runtime and never stored in this file.
  DEV_AUTH_BYPASS = "true"   # flip to "false" + wire Google SSO when ready
  APP_HOST = "0.0.0.0"
  APP_PORT = "8765"
  DATABASE_URL = "sqlite:////data/app.db"

[http_service]
  internal_port = 8765
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 50

# Persistent volume for SQLite. Created once via `fly volumes create`.
[mounts]
  source = "data"
  destination = "/data"

# Health check — the SPA fallback returns 200 on any GET.
[[http_service.checks]]
  grace_period = "15s"
  interval = "30s"
  method = "GET"
  path = "/api/auth/me"
  timeout = "5s"
  # /api/auth/me returns 401 when not logged in — that's fine for a
  # health check, it proves the Python process is alive and responding.
  [http_service.checks.headers]
    Accept = "application/json"
