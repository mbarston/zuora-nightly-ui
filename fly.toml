# fly.toml app configuration file generated for zuora-se-demo-data-agent on 2026-04-09T16:53:57-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'zuora-se-demo-data-agent'
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile'

[env]
  APP_HOST = '0.0.0.0'
  APP_PORT = '8765'
  DATABASE_URL = 'sqlite:////data/app.db'
  DEV_AUTH_BYPASS = 'true'

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8765
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 100
    soft_limit = 50

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
